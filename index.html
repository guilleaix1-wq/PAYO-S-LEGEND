<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payo's Legend | El Juego</title>
    <style>
        :root { --primary: #28a745; --bg: #1a1a1a; --card: #2a2a2a; --text: #ffffff; --accent: #ffc107; --danger: #ff4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .box { background: var(--card); border-radius: 15px; padding: 30px; margin: 20px auto; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; box-sizing: border-box; }
        h1 { color: var(--primary); font-size: 2.8rem; text-transform: uppercase; letter-spacing: 2px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 1rem; box-sizing: border-box; }
        button { padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; font-size: 1.1rem; }
        button:hover { background: #218838; transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; }
        #reloj { font-size: 3.5rem; font-weight: 900; color: var(--accent); }
        .pista-container { background: #333; padding: 20px; border-radius: 10px; margin: 20px 0; border-left: 6px solid var(--primary); text-align: left; box-sizing: border-box; overflow: hidden; }
        .pista-texto { color: #00ff00; font-style: italic; font-size: 1.15rem; line-height: 1.4; overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; display: block; }
        .resultado-item { text-align: left; border-bottom: 1px solid #444; padding: 15px; margin-bottom: 10px; background: #252525; border-radius: 8px; animation: fadeIn 0.6s ease-out; overflow-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .autor-tag { color: var(--primary); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
        ul { list-style: none; padding: 0; }
        li { background: #333; margin: 8px 0; padding: 12px; border-radius: 8px; font-weight: bold; }
        .ajustes-grid { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; }
        .input-mini { width: 70px !important; text-align: center; }
    </style>
</head>
<body>

    <h1>👑 Payo's Legend</h1>

    <div id="pantalla-inicio" class="box">
        <p>¿Listo para crear una leyenda?</p>
        <input type="text" id="nombre" placeholder="Tu nombre de Payo">
        <input type="text" id="sala" placeholder="Código de la sala">
        <button onclick="entrar()">Entrar a la Sala</button>
    </div>

    <div id="pantalla-lobby" class="box" style="display:none;">
        <h2>Sala: <span id="id-sala-actual" style="color: var(--primary);"></span></h2>
        <p>Leyendas en espera:</p>
        <ul id="lista-amigos"></ul>
        <div id="panel-lider" style="display:none; border-top: 1px solid #444; padding-top: 20px;">
            <h3>⚙️ Ajustes del Líder</h3>
            <div class="ajustes-grid">
                <label>Tiempo:</label> <input type="number" id="input-tiempo" class="input-mini" value="90">s
                <label>Pista:</label> <input type="number" id="input-caracteres" class="input-mini" value="100"> carac.
            </div>
            <button onclick="guardarYEmpezar()" style="background: var(--accent); color: black;">¡FORJAR LEYENDA!</button>
        </div>
        <p id="msg-espera">Esperando al líder de la banda...</p>
    </div>

    <div id="pantalla-juego" class="box" style="display:none;">
        <div id="reloj">90s</div>
        <h3 id="num-ronda">Ronda 1</h3>
        <div class="pista-container">
            <p id="pista-texto" class="pista-texto"></p>
            <p style="margin-top: 10px;">👥 Personajes: <span id="pista-personajes" style="color: var(--accent); font-weight: bold;"></span></p>
        </div>
        <textarea id="texto-historia" placeholder="Escribe el siguiente capítulo..." rows="5"></textarea>
        <input type="text" id="personajes-input" placeholder="¿Quién aparece ahora?">
        <button id="btn-enviar" onclick="enviar()">Enviar Turno</button>
    </div>

    <div id="pantalla-resultados" class="box" style="display:none; max-width: 800px;">
        <h2 id="titulo-presentacion">🍿 Crónicas de la Sala</h2>
        <div id="contenedor-presentacion"></div>
        <div id="controles-lider" style="display:none; margin-top:20px;">
            <button id="btn-inicio-p" onclick="empezarP()" style="background: var(--primary);">🎬 EMPEZAR LECTURA</button>
            <button id="btn-sig-p" onclick="siguienteP()" style="background: #007bff; display:none;">Siguiente página ➡️</button>
            <button id="btn-reiniciar-p" onclick="reiniciarP()" style="background: var(--accent); color:black; display:none;">🔄 NUEVA LEYENDA</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let miSala = "", soyLider = false;

        function entrar() {
            miSala = document.getElementById('sala').value.trim().toUpperCase();
            const nombre = document.getElementById('nombre').value.trim();
            if (nombre && miSala) socket.emit('unirse_sala', { salaId: miSala, nombre });
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('pantalla-lobby').style.display = 'block';
            document.getElementById('id-sala-actual').innerText = miSala;
        }

        function guardarYEmpezar() {
            socket.emit('actualizar_ajustes', { 
                salaId: miSala, 
                tiempo: document.getElementById('input-tiempo').value, 
                caracteres: document.getElementById('input-caracteres').value 
            });
            socket.emit('iniciar_juego', miSala);
        }

        function enviar() {
            socket.emit('enviar_segmento', { 
                salaId: miSala, 
                texto: document.getElementById('texto-historia').value, 
                personajes: document.getElementById('personajes-input').value || "Los de siempre" 
            });
            document.getElementById('btn-enviar').disabled = true;
            document.getElementById('btn-enviar').innerText = "✅ Capítulo enviado...";
        }

        function empezarP() { socket.emit('empezar_presentacion', miSala); }
        function siguienteP() { socket.emit('siguiente_paso', miSala); }
        function reiniciarP() { socket.emit('reiniciar_juego', miSala); }

        socket.on('es_lider', (l) => {
            soyLider = l;
            if (soyLider) {
                document.getElementById('panel-lider').style.display = 'block';
                document.getElementById('msg-espera').style.display = 'none';
                document.getElementById('controles-lider').style.display = 'block';
            }
        });

        socket.on('actualizar_lista', (j) => { 
            document.getElementById('lista-amigos').innerHTML = j.map(p => `<li>👤 ${p.nombre}</li>`).join(''); 
        });

        socket.on('timer_update', (s) => {
            const r = document.getElementById('reloj');
            if(r) {
                r.innerText = s + "s";
                r.style.color = s <= 10 ? "var(--danger)" : "var(--accent)";
            }
        });

        socket.on('nuevo_turno', (d) => {
            document.getElementById('pantalla-lobby').style.display = 'none';
            document.getElementById('pantalla-resultados').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'block';
            document.getElementById('pista-texto').innerText = d.textoAnterior;
            document.getElementById('pista-personajes').innerText = d.personajesAnteriores;
            document.getElementById('num-ronda').innerText = "Ronda " + d.ronda;
            document.getElementById('texto-historia').value = ""; 
            document.getElementById('personajes-input').value = "";
            document.getElementById('btn-enviar').disabled = false; 
            document.getElementById('btn-enviar').innerText = "Enviar Turno";
        });

        socket.on('tiempo_agotado', () => { 
            if (!document.getElementById('btn-enviar').disabled) enviar(); 
        });

        socket.on('mostrar_resultados', () => {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-resultados').style.display = 'block';
            document.getElementById('contenedor-presentacion').innerHTML = "<p>El líder de la banda va a empezar la crónica...</p>";
        });

        socket.on('actualizar_presentacion', (d) => {
            document.getElementById('btn-inicio-p').style.display = 'none';
            document.getElementById('btn-sig-p').style.display = soyLider ? 'block' : 'none';
            document.getElementById('titulo-presentacion').innerText = d.titulo;
            
            document.getElementById('contenedor-presentacion').innerHTML = d.segmentos.map(s => `
                <div class="resultado-item">
                    <span class="autor-tag">${s.autor} narró:</span>
                    <p style="margin: 0; line-height: 1.5;">${s.texto}</p>
                </div>
            `).join('');

            if (d.esUltimo && soyLider) {
                document.getElementById('btn-sig-p').style.display = 'none';
                document.getElementById('btn-reiniciar-p').style.display = 'block';
            }
        });

        socket.on('vuelta_a_lobby', () => {
            document.getElementById('pantalla-resultados').style.display = 'none';
            document.getElementById('pantalla-lobby').style.display = 'block';
            document.getElementById('btn-reiniciar-p').style.display = 'none';
            document.getElementById('btn-inicio-p').style.display = soyLider ? 'block' : 'none';
        });

        socket.on('error', (m) => alert(m));
    </script>
</body>
</html>
